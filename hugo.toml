baseURL = "https://aura-5s.github.io/p/"
languageCode = "es"
title = "poemas"

[taxonomies]
  author = "author"

# Los poemas se publican en /:slug/ directamente (sin subfolder de sección)
[permalinks]
  [permalinks.page]
    poemas = "/:slug/"

[params]
  accentColor = "rgb(180, 100, 120)"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
